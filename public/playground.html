<!DOCTYPE html>
<!--
  agent-pet playground — minimal fork-this template.
  Right-click → Save As, edit, drop into your project. No build step.
  Live source: https://agent-pet.pages.dev/playground.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>agent-pet playground</title>
  <style>
    body { background: #111; color: #eee; font-family: monospace; padding: 2rem; }
    button { margin: 0.25rem; padding: 0.4rem 0.8rem; background: #2a2a2a; color: #eee; border: 1px solid #444; cursor: pointer; }
  </style>
</head>
<body>
  <h1>agent-pet — minimal example</h1>
  <p>Buttons drive <code>AgentPet.setState()</code>. The pet is the script tag at the bottom.</p>

  <button onclick="AgentPet.setState('idle')">idle</button>
  <button onclick="AgentPet.setState('thinking')">thinking</button>
  <button onclick="AgentPet.setState('building')">building</button>
  <button onclick="AgentPet.setState('delegating')">delegating</button>
  <button onclick="AgentPet.setState('greeting')">greeting</button>
  <button onclick="AgentPet.setState('success')">success</button>
  <button onclick="AgentPet.setState('error')">error</button>
  <button onclick="AgentPet.say('hello!', {ttl: 4000})">say hello</button>
  <button onclick="AgentPet.say('build done', {link: 'https://example.com', ttl: 6000})">say with link</button>

  <p style="margin-top:2rem; opacity:0.7; font-size:0.9em;">
    Change <code>data-codex-pet</code> below to any pet slug from
    <a style="color:#7eb8da" href="https://codex-pets.net/">codex-pets.net</a>.
  </p>

  <script src="https://agent-pet.pages.dev/v0.1/agent-pet-widget.iife.js"
          data-codex-pet="homelander"></script>
</body>
</html>
