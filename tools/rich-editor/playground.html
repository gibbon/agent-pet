<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Ryu — 3D Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1018; color: #eee;
    font-family: -apple-system, system-ui, sans-serif; }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; }

  /* Header */
  .top {
    position: fixed; top: 12px; left: 12px; right: 12px; z-index: 10;
    display: flex; gap: 8px; pointer-events: none; align-items: flex-start;
  }
  .top h1 { font-size: 14px; font-weight: 600; opacity: 0.7; pointer-events: auto; }
  .top a { color: #aef; text-decoration: none; pointer-events: auto; font-size: 13px; }

  /* HUD bottom buttons */
  .hud {
    position: fixed; left: 0; right: 0; bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding: 0 8px;
    z-index: 10;
  }
  .hud button {
    background: rgba(40, 30, 30, 0.85); color: #eee;
    border: 1px solid rgba(231, 76, 60, 0.5); border-radius: 6px;
    padding: 12px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    min-height: 44px;
  }
  .hud button:active { background: rgba(231, 76, 60, 0.6); transform: scale(0.96); }
  .hud .label {
    flex: 1 1 100%;
    text-align: center; opacity: 0.6; font-size: 11px; padding-bottom: 4px;
  }

  /* Onboarding tip */
  .tip {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 8px;
    padding: 16px 20px; font-size: 13px; line-height: 1.5; max-width: 320px;
    backdrop-filter: blur(8px); z-index: 20; text-align: center;
    transition: opacity 400ms; pointer-events: none;
  }
  .tip.hidden { opacity: 0; }
  .tip kbd {
    background: #2a2a35; padding: 1px 6px; border: 1px solid #555;
    border-radius: 3px; font-family: ui-monospace, monospace; font-size: 11px;
  }

  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0b1018; color: #888; font-size: 14px; z-index: 30; transition: opacity 400ms; }
  #loading.hidden { opacity: 0; pointer-events: none; }

  /* Save picker — slim bar near the top-right with a dropdown of every
   * compatible save in localStorage so you can A/B variants live. */
  .loader-bar {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    pointer-events: auto;
  }
  .loader-bar select {
    background: rgba(11, 16, 24, 0.85); color: #eee;
    border: 1px solid #2a3550; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; max-width: 280px;
    backdrop-filter: blur(8px);
  }
</style>
<!-- Shared starter presets — same source as the editor and pet-tester.
     Loads as a plain script so window.STARTER_PRESETS is set before the
     ES-module body runs and reads it. -->
<script src="/presets.js"></script>
</head>
<body>

<div id="stage"></div>
<div id="loading">loading scene…</div>

<div class="top">
  <a href="/" title="Back to index">← index</a>
  <h1>3D playground</h1>
</div>

<div class="tip" id="tip">
  <strong>Tap the ground</strong> to walk Ryu there, or use <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>/arrow keys.<br>
  <strong>Drag</strong> to orbit the camera. <kbd>1</kbd>–<kbd>5</kbd> for moves.<br>
  Use the buttons below for moves.
</div>

<div class="loader-bar">
  <select id="save-picker" title="Switch the playground to a different saved manifest. Only saves whose atlas + actions block is compatible with the playground are listed.">
    <option value="">Default (Ryu /ryu.json)</option>
  </select>
</div>

<div class="hud">
  <span class="label">moves — keys 1·2·3·4·5</span>
  <button data-action="hadouken">Hadouken</button>
  <button data-action="shoryuken">Shoryuken</button>
  <button data-action="kick">Kick</button>
  <button data-action="spinkick">Spin Kick</button>
  <button data-action="taunt">Taunt</button>
</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.163.0';
import { OrbitControls } from 'https://esm.sh/three@0.163.0/addons/controls/OrbitControls.js';

// ─── Scene + camera + renderer ───────────────────────────────────────
const scene = new THREE.Scene();
const fogColor = 0x141a26;
scene.background = new THREE.Color(fogColor);
scene.fog = new THREE.Fog(fogColor, 14, 32);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 4.5, 9);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('stage').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.enablePan = false;
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.9));

// ─── Ground (grid floor for depth cues) ──────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshBasicMaterial({ color: 0x18202c }),
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
const grid = new THREE.GridHelper(60, 30, 0x2a3550, 0x1c2230);
grid.position.y = 0.01;
scene.add(grid);

// ─── Manifest + spritesheet ──────────────────────────────────────────
// `manifest`, `baseTex`, and the derived constants below get re-bound by
// loadManifest() when the user picks a different save from the dropdown.
let manifest, baseTex, COLS, ROWS, ROWS_DEF, ACTIONS;
async function loadManifest(m, sheetUrl) {
  const tex = await new Promise((res, rej) => new THREE.TextureLoader().load(sheetUrl, (t) => {
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    t.colorSpace = THREE.SRGBColorSpace;
    t.generateMipmaps = false;
    res(t);
  }, undefined, rej));
  manifest = m;
  baseTex = tex;
  COLS = manifest.atlas.cols;
  ROWS = manifest.atlas.rows;
  ROWS_DEF = manifest.atlas.rowsDef;
  ACTIONS = manifest.actions ?? {};
}
function rowDef(id) { return ROWS_DEF.find(r => r.id === id); }
// Initial bootstrap — same /ryu.json + /spritesheet.webp the playground
// has always used. Picker can replace this at runtime.
await loadManifest(
  await fetch('/ryu.json').then(r => r.json()),
  '/spritesheet.webp',
);

// Aspect of one cell: spritesheet is COLS×ROWS, total 1536x2288, so each cell
// is 192x208. Ratio of plane height/width = 208/192 ≈ 1.083.
const CELL_ASPECT = 208 / 192;

// ─── Source-frame rip cache ─────────────────────────────────────────
// Rich actions can source from a raw rip (sprites.json + image) instead
// of a packed atlas. Each rip's image + bbox metadata is loaded on
// demand and cached so swapping characters is fast on repeat visits.
const ripCache = new Map(); // imageUrl → { tex, w, h, sprites: Map<"band.idx", bbox> }
async function ensureSourceRip(imageUrl, spritesUrl) {
  if (!imageUrl || !spritesUrl) return null;
  if (ripCache.has(imageUrl)) return ripCache.get(imageUrl);
  const [tex, sprites] = await Promise.all([
    new Promise((res, rej) => new THREE.TextureLoader().load(imageUrl, (t) => {
      t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
      t.colorSpace = THREE.SRGBColorSpace; t.generateMipmaps = false;
      res(t);
    }, undefined, rej)),
    fetch(spritesUrl).then((r) => r.json()),
  ]);
  const map = new Map();
  for (const s of sprites) map.set(`${s.band}.${s.idx}`, s.bbox);
  const entry = {
    tex, sprites: map,
    w: tex.image.naturalWidth, h: tex.image.naturalHeight,
  };
  ripCache.set(imageUrl, entry);
  return entry;
}

/** Make a source-frame sprite. Geometry is unit-sized; mesh.scale is
 *  written per-frame to match the bbox aspect. UV is updated in
 *  setSourceFrame to crop the bbox out of the source image. */
function makeSourceFrameSprite(rip, targetSize) {
  const tex = rip.tex.clone();
  tex.needsUpdate = true;
  tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
  tex.colorSpace = THREE.SRGBColorSpace; tex.generateMipmaps = false;
  const geo = new THREE.PlaneGeometry(1, 1);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide,
    depthWrite: false, alphaTest: 0.05,
  });
  const mesh = new THREE.Mesh(geo, mat);
  return { mesh, tex, rip, targetSize: targetSize ?? 2.6, w: targetSize, h: targetSize, kind: 'source' };
}
function setSourceFrame(sprite, frame) {
  const bbox = sprite.rip.sprites.get(`${frame.band}.${frame.idx}`);
  if (!bbox) return;
  const [x0, y0, x1, y1] = bbox;
  const bw = Math.max(1, x1 - x0);
  const bh = Math.max(1, y1 - y0);
  const W = sprite.rip.w, H = sprite.rip.h;
  // UV: image-Y is top-down but UV-Y is bottom-up.
  if (frame.flipH) {
    sprite.tex.repeat.set(-bw / W, bh / H);
    sprite.tex.offset.set(x1 / W, 1 - y1 / H);
  } else {
    sprite.tex.repeat.set(bw / W, bh / H);
    sprite.tex.offset.set(x0 / W, 1 - y1 / H);
  }
  // Scale mesh so the longest bbox axis = targetSize world units.
  const longest = Math.max(bw, bh);
  const scale = sprite.targetSize / longest;
  sprite.w = bw * scale; sprite.h = bh * scale;
  sprite.mesh.scale.set(sprite.w, sprite.h, 1);
}
/** Make an atlas-cell sprite — wraps the existing makeAtlasSprite so
 *  rich-action tracks of either kind share the same interface. */
function makeAtlasCellSprite(targetSize) {
  const s = makeAtlasSprite(targetSize);
  s.kind = 'atlas';
  return s;
}
function setAtlasCellFrame(sprite, rowId, frameIdx, flipH) {
  setFrame(sprite, rowId, frameIdx, flipH);
}

// ─── Atlas-textured plane ────────────────────────────────────────────
function makeAtlasSprite(scale) {
  // Each sprite gets its OWN texture clone so it can step through frames
  // independently. The underlying image is shared.
  const tex = baseTex.clone();
  tex.needsUpdate = true;
  tex.repeat.set(1 / COLS, 1 / ROWS);
  const w = scale, h = scale * CELL_ASPECT;
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide,
    depthWrite: false, alphaTest: 0.05,
  });
  const mesh = new THREE.Mesh(geo, mat);
  return { mesh, tex, w, h };
}

function setFrame(sprite, rowId, frameIdx, flipH) {
  const r = rowDef(rowId);
  if (!r) return;
  // Atlas Y is from top in image-space but UV space is bottom-up.
  const v = 1 - (r.index + 1) / ROWS;
  if (flipH) {
    sprite.tex.repeat.x = -1 / COLS;
    sprite.tex.offset.set((frameIdx + 1) / COLS, v);
  } else {
    sprite.tex.repeat.x = 1 / COLS;
    sprite.tex.offset.set(frameIdx / COLS, v);
  }
}

// ─── Ryu (the player) ────────────────────────────────────────────────
const ryu = makeAtlasSprite(2.6);
ryu.mesh.position.set(0, ryu.h / 2, 0);
scene.add(ryu.mesh);

// State the renderer reads each frame.
const player = {
  state: 'idle',          // current row id being played
  persistent: 'idle',     // row to return to after an action ends
  facing: 'left',         // which way the sprite is flipped
  frame: 0,
  lastFrameTimeMs: 0,
  actionEndsAtMs: 0,      // 0 = no action; otherwise the wall-clock when it ends
  jump: null,             // { startMs, durMs, peak, baseY }
  walkTarget: null,       // Vector3 the player is walking toward
};

function setRow(rowId) {
  if (player.state === rowId) return;
  player.state = rowId;
  player.frame = 0;
  player.lastFrameTimeMs = 0;
}

// Manifest's stateMap aligns with how the agent-pet widget maps the 9 default
// states; here we just use action names directly. Walk-right/left rows have
// flipH:false/true in the manifest because Ryu is drawn facing right by
// default in the source. With our `facing` variable, we choose the row id.
function rowForFacing(rowBase) {
  // For idle/wait/etc., let the row's manifest flipH default rule apply.
  // For walking, switch row id by direction.
  return rowBase;
}

// ─── Animation tick ─────────────────────────────────────────────────
function tickPlayer(nowMs) {
  // Action end?
  if (player.actionEndsAtMs > 0 && nowMs >= player.actionEndsAtMs) {
    player.actionEndsAtMs = 0;
    setRow(player.persistent);
  }
  // Frame stepping
  const r = rowDef(player.state) || rowDef('idle');
  if (!r) return;
  const intervalMs = 1000 / Math.max(1, r.fps);
  if (nowMs - player.lastFrameTimeMs >= intervalMs) {
    player.lastFrameTimeMs = nowMs;
    player.frame = (player.frame + 1) % r.frames;
  }
  // Determine flipH: walk rows already encode direction in row id; for
  // everything else, flip when facing right (the source frames are flipped).
  // Actions like hadouken/shoryuken use the manifest's row.id, which is
  // drawn left-facing — flip when player is facing right.
  let flipH;
  if (player.state === 'walk-right') flipH = false;
  else if (player.state === 'walk-left') flipH = true;
  else flipH = player.facing === 'right' ? false : true;
  setFrame(ryu, player.state, player.frame, flipH);
}

// ─── Movement (tap ground to walk) ───────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function pickGround(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(ground);
  return hits.length ? hits[0].point : null;
}

let pointerDownPos = null;
let pointerDownTime = 0;
renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
  pointerDownTime = performance.now();
});
renderer.domElement.addEventListener('pointerup', (e) => {
  if (!pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x, dy = e.clientY - pointerDownPos.y;
  const moved = Math.hypot(dx, dy) > 6;
  const heldMs = performance.now() - pointerDownTime;
  pointerDownPos = null;
  // Treat as tap only if we didn't drag (orbit) and didn't long-press.
  if (moved || heldMs > 600) return;
  const p = pickGround(e.clientX, e.clientY);
  if (p) player.walkTarget = new THREE.Vector3(p.x, ryu.h / 2, p.z);
  hideTip();
});

function tickMovement(dtSec) {
  if (!player.walkTarget) {
    if (player.actionEndsAtMs === 0) {
      player.persistent = 'idle';
      if (player.state !== 'idle') setRow('idle');
    }
    return;
  }
  const target = player.walkTarget;
  const dir = new THREE.Vector3(target.x - ryu.mesh.position.x, 0, target.z - ryu.mesh.position.z);
  const dist = dir.length();
  if (dist < 0.08) {
    player.walkTarget = null;
    if (player.actionEndsAtMs === 0) { player.persistent = 'idle'; setRow('idle'); }
    return;
  }
  const speed = 3.4;
  dir.normalize().multiplyScalar(Math.min(dist, speed * dtSec));
  ryu.mesh.position.x += dir.x;
  ryu.mesh.position.z += dir.z;
  // Pick walk row based on the X component (camera is roughly aligned to z).
  player.facing = dir.x < 0 ? 'left' : 'right';
  if (player.actionEndsAtMs === 0) {
    const row = player.facing === 'left' ? 'walk-left' : 'walk-right';
    player.persistent = row;
    if (player.state !== row) setRow(row);
  }
}

// ─── Billboard the sprite to face the camera (Y-axis only) ──────────
function tickBillboard() {
  ryu.mesh.lookAt(camera.position.x, ryu.mesh.position.y, camera.position.z);
}

// ─── Jump arc (for SHORYUKEN) ───────────────────────────────────────
function tickJump(nowMs) {
  if (!player.jump) return;
  const j = player.jump;
  const t = (nowMs - j.startMs) / j.durMs;
  if (t >= 1) {
    ryu.mesh.position.y = j.baseY;
    player.jump = null;
    return;
  }
  // Sine arc from 0 to peak back to 0
  ryu.mesh.position.y = j.baseY + Math.sin(t * Math.PI) * j.peak;
}

// ─── Projectiles (fireball flying through the scene) ────────────────
const projectiles = [];
function spawnFireball(originPos, dir3) {
  const fb = makeAtlasSprite(0.9);
  fb.mesh.position.copy(originPos);
  fb.mesh.position.y -= 0.3;
  scene.add(fb.mesh);
  projectiles.push({
    sprite: fb,
    dir: dir3.clone().normalize(),
    spawnMs: performance.now(),
    lifeMs: 1500,
    speed: 7,
  });
}
function tickProjectiles(nowMs, dtSec) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    const age = nowMs - p.spawnMs;
    if (age > p.lifeMs) {
      scene.remove(p.sprite.mesh);
      projectiles.splice(i, 1);
      continue;
    }
    p.sprite.mesh.position.x += p.dir.x * p.speed * dtSec;
    p.sprite.mesh.position.z += p.dir.z * p.speed * dtSec;
    p.sprite.mesh.lookAt(camera.position.x, p.sprite.mesh.position.y, camera.position.z);
    const r = rowDef('fireball');
    const f = Math.floor((age / 1000) * r.fps) % r.frames;
    setFrame(p.sprite, 'fireball', f, p.dir.x > 0);
  }
}

// ─── Action triggers from HUD ───────────────────────────────────────
// `play(name)` dispatches to whichever variant exists in the manifest:
// rich-action mode (manifest.richActions[name]) takes precedence —
// that's the format the editor authors. Falls back to legacy
// atlas-row actions (manifest.actions[name]) for backwards-compat.
function play(actionName) {
  if (manifest.richActions?.[actionName]) {
    playRichAction(actionName);
    return;
  }
  const a = ACTIONS[actionName];
  if (!a) return;
  hideTip();
  const r = rowDef(a.row);
  if (!r) return;
  const loops = a.loops ?? 1;
  const fps = a.fps ?? r.fps;
  const durMs = (r.frames * loops / fps) * 1000;
  player.actionEndsAtMs = performance.now() + durMs;
  setRow(a.row);
  if (a.spawn) {
    for (const sp of a.spawn) {
      const delayMs = (sp.atFrame * 1000) / fps;
      setTimeout(() => {
        const dir = new THREE.Vector3(player.facing === 'left' ? -1 : 1, 0, 0);
        const origin = ryu.mesh.position.clone().add(dir.clone().multiplyScalar(0.4));
        spawnFireball(origin, dir);
      }, delayMs);
    }
  }
  if (a.jumpHeight) {
    player.jump = {
      startMs: performance.now(),
      durMs,
      peak: a.jumpHeight / 70,
      baseY: ryu.h / 2,
    };
  }
}

// ─── Rich-action playback ───────────────────────────────────────────
// Mirrors the rich runtime at src/rich/runtime.ts but operates on
// THREE.Mesh sprites in 3D space. Each track becomes its own mesh that
// follows the track's keyframes; spawns fire at sp.t * durationMs.
//
// Coordinate mapping: rich keyframe x/y are in 2D editor pixels. We map
// them to 3D scene units at PX_PER_UNIT (matches the stage's SIZE=96 →
// roughly 70 px = 1 world unit so the moves read like the stage).
const PX_PER_UNIT = 70;
const richActive = []; // active rich actions: { startMs, action, tracks, spawnFired, jump }

function easing(t, kind) {
  switch (kind) {
    case 'step': return 0;
    case 'ease-in': return t * t;
    case 'ease-out': return 1 - (1 - t) * (1 - t);
    case 'ease-in-out': return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    default: return t;
  }
}
function lerp(a, b, t, def) {
  if (a === undefined && b === undefined) return def;
  if (a === undefined) return b;
  if (b === undefined) return a;
  return a + (b - a) * t;
}
function sampleKeyframes(track, t) {
  const ks = track.keyframes ?? [];
  if (!ks.length) {
    return { x: 0, y: 0, scaleX: 1, scaleY: 1, rotation: 0, alpha: 1, flipH: false };
  }
  let i = 0;
  while (i < ks.length - 1 && ks[i + 1].t <= t) i++;
  const a = ks[i];
  const b = i < ks.length - 1 ? ks[i + 1] : a;
  let u = 0;
  if (b !== a) {
    const span = b.t - a.t;
    u = span > 0 ? Math.max(0, Math.min(1, (t - a.t) / span)) : 0;
    u = easing(u, b.easing);
  }
  return {
    x: lerp(a.x, b.x, u, 0),
    y: lerp(a.y, b.y, u, 0),
    scaleX: lerp(a.scaleX, b.scaleX, u, 1),
    scaleY: lerp(a.scaleY, b.scaleY, u, 1),
    rotation: lerp(a.rotation, b.rotation, u, 0),
    alpha: lerp(a.alpha, b.alpha, u, 1),
    flipH: (b.flipH === undefined ? a.flipH : b.flipH) ?? false,
  };
}

async function playRichAction(actionName) {
  const action = manifest.richActions[actionName];
  if (!action) return;
  hideTip();
  // Lazy-load the source-frame rip if any track / spawn needs one. We
  // need its sprites image + bbox map cached before we start ticking.
  const needsSourceRip = (action.tracks ?? []).some((t) => t.frames?.length)
    || (action.spawn ?? []).some((s) => s.frames?.length);
  let sourceRip = null;
  if (needsSourceRip) {
    const imageUrl = manifest.sourceImage;
    const spritesUrl = manifest.spritesUrl ?? deriveSpritesUrl(imageUrl);
    if (imageUrl && spritesUrl) {
      sourceRip = await ensureSourceRip(imageUrl, spritesUrl);
    }
  }
  // Build a sprite per track. Atlas-row tracks reuse the player's main
  // sprite (so the existing facing / position logic carries through).
  // Source-frame tracks get fresh meshes positioned at the player.
  const tracks = (action.tracks ?? []).map((track, idx) => {
    if (track.frames?.length && sourceRip) {
      const sp = makeSourceFrameSprite(sourceRip, 2.6);
      sp.mesh.position.copy(ryu.mesh.position);
      scene.add(sp.mesh);
      return { track, sprite: sp, ownsSprite: true, idx };
    }
    if (track.row) {
      // Atlas-row track — drive the main player sprite. If multiple
      // atlas-row tracks exist (rare), only the first uses the player;
      // others get clones.
      if (idx === 0) return { track, sprite: ryu, ownsSprite: false, idx };
      const sp = makeAtlasCellSprite(2.6);
      sp.mesh.position.copy(ryu.mesh.position);
      scene.add(sp.mesh);
      return { track, sprite: sp, ownsSprite: true, idx };
    }
    return null;
  }).filter(Boolean);

      const fps = t.track.fps ?? r.fps;
      const loops = t.track.loops ?? 1;
      const total = Math.floor(elapsed / 1000 * fps);

    // scale on TOP for keyframes. For source-frame: setSourceFrame
    // rewrote scale, so multiply by keyframe scale.

  // /rips/<slug>/<slug>.png → /rips/<slug>/<slug>.json (the convention

      sprite: fb,

/** Rebuild HUD buttons from whatever actions the current manifest

  const label = hud.querySelector('.label');

  const legacyKeys = richKeys.length ? [] : Object.keys(manifest.actions ?? {});

 *  caller skips tap-to-walk in that case. */

  if (keysDown.has('left'))    mx -= 1;
  if (keysDown.has('right'))   mx += 1;
  if (mx === 0 && mz === 0) return false;

  // the XZ plane; right is forward × up. Moving "right" (D) sends the
  // player along camera-right, which feels natural after orbiting.
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;

  setTimeout(() => tip.remove(), 600);
}

// ─── Resize ─────────────────────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}, { passive: true });

// ─── Main loop ──────────────────────────────────────────────────────
let lastT = performance.now();
function animate() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  // Keyboard movement takes priority over tap-to-walk; if no keys are
  // held, fall through to the tap target.
  if (!tickKeyboardMovement(dt)) tickMovement(dt);
  tickJump(now);
  tickPlayer(now);
  // Tick rich-action instances; cleaned up entries are spliced.
  for (let i = richActive.length - 1; i >= 0; i--) {
    if (!tickRichAction(richActive[i], now)) richActive.splice(i, 1);
  }
  // Auto-loop idle / walk-left / walk-right for rich-only manifests so
  // the pet stays visible at rest and during movement. No-op for the
  // default Ryu atlas-row manifest.
  ambientTick(now);
  tickRichParticles(now);
  tickProjectiles(now, dt);
  tickBillboard();
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

document.getElementById('loading').classList.add('hidden');
setTimeout(() => document.getElementById('loading').remove(), 600);
requestAnimationFrame(animate);
</script>

</body>
</html>
